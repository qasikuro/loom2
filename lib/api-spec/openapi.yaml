openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Sky Journal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: character
    description: Character profile
  - name: journal
    description: Journal entries
  - name: stories
    description: Manga-style stories
  - name: outfits
    description: Outfit logs
  - name: gallery
    description: Photo gallery
  - name: social
    description: Follows, friends, and discover feed
  - name: notifications
    description: Activity notifications
  - name: rewards
    description: Rewards, shop, and constellation

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /character:
    get:
      operationId: getCharacter
      tags: [character]
      summary: Get the user character profile
      responses:
        "200":
          description: Character profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
    put:
      operationId: updateCharacter
      tags: [character]
      summary: Update the user character profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterInput"
      responses:
        "200":
          description: Updated character profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"

  /journal-entries:
    get:
      operationId: listJournalEntries
      tags: [journal]
      summary: List all journal entries newest first
      responses:
        "200":
          description: List of journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournalEntry
      tags: [journal]
      summary: Create a new journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "201":
          description: Created journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

  /journal-entries/{id}:
    delete:
      operationId: deleteJournalEntry
      tags: [journal]
      summary: Delete a journal entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /stories:
    get:
      operationId: listStories
      tags: [stories]
      summary: List all stories newest first
      responses:
        "200":
          description: List of stories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Story"
    post:
      operationId: createStory
      tags: [stories]
      summary: Create a new story
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryInput"
      responses:
        "201":
          description: Created story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /stories/{id}:
    get:
      operationId: getStory
      tags: [stories]
      summary: Get a story by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "404":
          description: Not found
    delete:
      operationId: deleteStory
      tags: [stories]
      summary: Delete a story
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /stories/{id}/witness:
    post:
      operationId: witnessStory
      tags: [stories]
      summary: Increment the witnessed count of a story
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /outfits:
    get:
      operationId: listOutfits
      tags: [outfits]
      summary: List all outfit logs newest first
      responses:
        "200":
          description: List of outfits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Outfit"
    post:
      operationId: createOutfit
      tags: [outfits]
      summary: Create an outfit log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutfitInput"
      responses:
        "201":
          description: Created outfit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outfit"

  /outfits/{id}:
    delete:
      operationId: deleteOutfit
      tags: [outfits]
      summary: Delete an outfit log
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /gallery:
    get:
      operationId: listGallery
      tags: [gallery]
      summary: List all gallery photos newest first
      responses:
        "200":
          description: List of gallery photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryPhoto"

  /gallery/usage:
    get:
      operationId: getGalleryUsage
      tags: [gallery]
      summary: Get gallery storage usage
      responses:
        "200":
          description: Gallery usage stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryUsage"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List activity notifications newest first
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /discover:
    get:
      operationId: listDiscoverFeed
      tags: [social]
      summary: Ranked discovery feed of public stories
      responses:
        "200":
          description: List of discover posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscoverPost"

  /rewards:
    get:
      operationId: getRewardBalance
      tags: [rewards]
      summary: Get current reward currency balances
      responses:
        "200":
          description: Reward balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardBalance"

  /rewards/shop:
    get:
      operationId: getRewardsShop
      tags: [rewards]
      summary: Get shop catalog, purchased IDs and active cosmetics
      responses:
        "200":
          description: Shop data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopResponse"

  /constellation:
    get:
      operationId: getConstellation
      tags: [rewards]
      summary: Get constellation progress
      responses:
        "200":
          description: Constellation state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstellationState"

  /friends:
    get:
      operationId: listFriends
      tags: [social]
      summary: List profiles of users I follow
      responses:
        "200":
          description: List of friend profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendSummary"

  /follows/following:
    get:
      operationId: listFollowing
      tags: [social]
      summary: Get IDs of users I follow
      responses:
        "200":
          description: List of user IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Character:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        bio:
          type: string
        mood:
          type: string
        traits:
          type: array
          items:
            type: string
        isPublic:
          type: boolean
        updatedAt:
          type: string
          format: date-time
      required: [id, name, bio, mood, traits, isPublic, updatedAt]

    CharacterInput:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        mood:
          type: string
        traits:
          type: array
          items:
            type: string
        isPublic:
          type: boolean
      required: [name, bio, mood, traits, isPublic]

    StoryPanel:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        imageUri:
          type: string
          nullable: true
      required: [id, text]

    Story:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
          format: date-time
        chapterTitle:
          type: string
        panels:
          type: array
          items:
            $ref: "#/components/schemas/StoryPanel"
        mood:
          type: string
        location:
          type: string
        isPublic:
          type: boolean
        witnessedCount:
          type: integer
        savedCount:
          type: integer
        stickerCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, date, chapterTitle, panels, mood, location, isPublic, witnessedCount, savedCount, stickerCount, createdAt]

    StoryInput:
      type: object
      properties:
        id:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
        chapterTitle:
          type: string
        panels:
          type: array
          items:
            $ref: "#/components/schemas/StoryPanel"
        mood:
          type: string
        location:
          type: string
        isPublic:
          type: boolean
      required: [date, chapterTitle, panels, mood, location, isPublic]

    JournalEntry:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
          format: date-time
        type:
          type: string
          enum: [diary, friend, moment]
        text:
          type: string
        mood:
          type: string
        imageUri:
          type: string
          nullable: true
        friendName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, date, type, text, mood, createdAt]

    JournalEntryInput:
      type: object
      properties:
        id:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
        type:
          type: string
          enum: [diary, friend, moment]
        text:
          type: string
        mood:
          type: string
        imageUri:
          type: string
          nullable: true
        friendName:
          type: string
          nullable: true
      required: [date, type, text, mood]

    Outfit:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
          format: date-time
        name:
          type: string
        description:
          type: string
        imageUri:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        isPublic:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, date, name, description, tags, isPublic, createdAt]

    OutfitInput:
      type: object
      properties:
        id:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
        name:
          type: string
        description:
          type: string
        imageUri:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        isPublic:
          type: boolean
      required: [date, name, description, tags, isPublic]

    GalleryPhoto:
      type: object
      properties:
        id:
          type: string
        imageUri:
          type: string
        caption:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, imageUri, caption, createdAt]

    GalleryUsage:
      type: object
      properties:
        count:
          type: integer
        limit:
          type: integer
      required: [count, limit]

    Notification:
      type: object
      properties:
        id:
          type: string
        actorId:
          type: string
        actorName:
          type: string
        type:
          type: string
        refId:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, actorId, actorName, type, isRead, createdAt]

    DiscoverPost:
      type: object
      properties:
        id:
          type: string
        authorUserId:
          type: string
        authorName:
          type: string
        authorUsername:
          type: string
          nullable: true
        authorAvatarUri:
          type: string
          nullable: true
        chapterTitle:
          type: string
        description:
          type: string
        storySnippet:
          type: string
        imageUri:
          type: string
          nullable: true
        mood:
          type: string
        location:
          type: string
        witnessedCount:
          type: integer
        savedCount:
          type: integer
        stickerCount:
          type: integer
        date:
          type: string
          format: date-time
        panels:
          type: array
          items:
            type: object
        isFollowing:
          type: boolean
      required: [id, authorUserId, authorName, chapterTitle, description, storySnippet, mood, location, witnessedCount, savedCount, stickerCount, date, panels, isFollowing]

    RewardBalance:
      type: object
      properties:
        stars:
          type: integer
        auraEnergy:
          type: integer
        memoryShards:
          type: integer
        lifetimeStars:
          type: integer
      required: [stars, auraEnergy, memoryShards, lifetimeStars]

    ShopItemCost:
      type: object
      properties:
        stars:
          type: integer
        aura:
          type: integer
        shards:
          type: integer

    ShopItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        category:
          type: string
          enum: [frame, accent, theme, effect]
        cost:
          $ref: "#/components/schemas/ShopItemCost"
        seasonal:
          type: boolean
          nullable: true
        seasonalLabel:
          type: string
          nullable: true
        seasonalMonths:
          type: array
          items:
            type: integer
          nullable: true
      required: [id, name, description, icon, category, cost]

    ShopResponse:
      type: object
      properties:
        catalog:
          type: array
          items:
            $ref: "#/components/schemas/ShopItem"
        seasonalPreview:
          type: array
          items:
            $ref: "#/components/schemas/ShopItem"
        purchasedIds:
          type: array
          items:
            type: string
        activeCosmetics:
          type: object
          additionalProperties:
            type: string
      required: [catalog, seasonalPreview, purchasedIds, activeCosmetics]

    ConstellationState:
      type: object
      properties:
        socialCount:
          type: integer
        memoryCount:
          type: integer
        quietStreak:
          type: integer
        helpingCount:
          type: integer
        creativeCount:
          type: integer
        seasonalCount:
          type: integer
        unlockedStars:
          type: array
          items:
            type: string
        starUnlockDates:
          type: object
        activeTitle:
          type: string
          nullable: true
        newlyUnlocked:
          type: array
          items:
            type: string
      required: [socialCount, memoryCount, quietStreak, helpingCount, creativeCount, seasonalCount, unlockedStars, starUnlockDates, newlyUnlocked]

    FriendSummary:
      type: object
      properties:
        userId:
          type: string
        name:
          type: string
        username:
          type: string
          nullable: true
        bio:
          type: string
        mood:
          type: string
        traits:
          type: array
          items:
            type: string
        avatarUri:
          type: string
          nullable: true
        birthday:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        links:
          type: array
          items:
            type: object
        isPublic:
          type: boolean
      required: [userId, name, bio, mood, traits, links, isPublic]
