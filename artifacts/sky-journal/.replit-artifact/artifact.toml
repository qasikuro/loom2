kind = "mobile"
previewPath = "/"
title = "Sky Journal"
version = "1.0.0"
id = "artifacts/sky-journal"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20450

[services.development]
run = "pnpm --filter @workspace/sky-journal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sky-journal", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sky-journal", "run", "serve" ]

[services.env]
PORT = "20450"
BASE_PATH = "/"
