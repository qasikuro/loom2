<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #1a0533 0%, #0d1b4b 60%, #1a1630 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .scene {
    display: flex;
    gap: 50px;
    align-items: flex-end;
    padding: 70px 80px;
  }
  .phone-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .label {
    color: rgba(200,184,232,0.85);
    font-size: 13px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-weight: 600;
  }
  /* ---- iPhone 15 Pro ---- */
  .iphone {
    width: 300px;
    height: 622px;
    background: #1C1C1E;
    border-radius: 50px;
    position: relative;
    box-shadow:
      0 0 0 1.5px #3a3a3c,
      0 0 0 3px #1C1C1E,
      0 0 0 4.5px #58585a,
      0 50px 100px rgba(0,0,0,0.75),
      inset 0 0 0 1px rgba(255,255,255,0.08);
  }
  .iphone::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 55%;
    border-radius: 50px 50px 0 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
    pointer-events: none; z-index: 10;
  }
  .iphone-screen {
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border-radius: 43px;
    overflow: hidden;
    background: #000;
  }
  .iphone-screen img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
  .dynamic-island {
    position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
    width: 104px; height: 32px; background: #000; border-radius: 20px; z-index: 20;
  }
  .i-btn-mute { position: absolute; left: -3.5px; top: 96px; width: 3px; height: 20px; background: #3a3a3c; border-radius: 2px 0 0 2px; }
  .i-btn-vup  { position: absolute; left: -3.5px; top: 128px; width: 3px; height: 32px; background: #3a3a3c; border-radius: 2px 0 0 2px; }
  .i-btn-vdn  { position: absolute; left: -3.5px; top: 172px; width: 3px; height: 32px; background: #3a3a3c; border-radius: 2px 0 0 2px; }
  .i-btn-pwr  { position: absolute; right: -3.5px; top: 150px; width: 3px; height: 66px; background: #3a3a3c; border-radius: 0 2px 2px 0; }

  /* ---- Pixel 8 Pro ---- */
  .android {
    width: 300px;
    height: 632px;
    background: #18191A;
    border-radius: 40px;
    position: relative;
    box-shadow:
      0 0 0 1.5px #333,
      0 0 0 3px #18191A,
      0 0 0 4.5px #4a4a4a,
      0 50px 100px rgba(0,0,0,0.75),
      inset 0 0 0 1px rgba(255,255,255,0.05);
  }
  .android::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 55%;
    border-radius: 40px 40px 0 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
    pointer-events: none; z-index: 10;
  }
  .android-screen {
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border-radius: 33px;
    overflow: hidden;
    background: #000;
  }
  .android-screen img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
  .punch-hole {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    width: 11px; height: 11px; background: #050505; border-radius: 50%; z-index: 20;
    box-shadow: 0 0 0 1px #2a2a2a;
  }
  .a-btn-vol  { position: absolute; right: -3.5px; top: 132px; width: 3px; height: 56px; background: #333; border-radius: 0 2px 2px 0; }
  .a-btn-pwr  { position: absolute; right: -3.5px; top: 204px; width: 3px; height: 34px; background: #333; border-radius: 0 2px 2px 0; }

  /* Shared brand text */
  .brand {
    position: absolute; bottom: 24px; left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.25);
    font-size: 9px; letter-spacing: 3px; z-index: 20; font-weight: 600;
    text-transform: uppercase;
  }

  /* App name watermark at top */
  .app-title {
    position: absolute;
    top: 30px; left: 0; right: 0;
    text-align: center;
    color: rgba(200,184,232,0.4);
    font-size: 11px;
    letter-spacing: 4px;
    font-weight: 600;
    text-transform: uppercase;
  }
</style>
</head>
