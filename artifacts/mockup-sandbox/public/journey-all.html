<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #0D0820 0%, #12103A 40%, #1A1030 100%);
  padding: 60px 50px 70px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-width: 1600px;
}
h1 {
  text-align:center;
  color:rgba(200,184,232,0.7);
  font-size:13px;
  letter-spacing:5px;
  text-transform:uppercase;
  font-weight:600;
  margin-bottom:48px;
}
.row { display:flex; gap:36px; align-items:flex-end; justify-content:center; }
.phone-wrap { display:flex; flex-direction:column; align-items:center; gap:18px; }
.screen-label {
  color:rgba(200,184,232,0.55);
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  font-weight:600;
}
.iphone {
  width: 260px;
  height: 538px;
  background: #1C1C1E;
  border-radius: 44px;
  position: relative;
  box-shadow:
    0 0 0 1.5px #3a3a3c,
    0 0 0 3px #1C1C1E,
    0 0 0 4px #58585a,
    0 40px 80px rgba(0,0,0,0.75),
    inset 0 0 0 1px rgba(255,255,255,0.07);
}
.iphone::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:55%;
  border-radius:44px 44px 0 0;
  background:linear-gradient(180deg,rgba(255,255,255,0.07) 0%,transparent 100%);
  pointer-events:none; z-index:10;
}
.iphone-screen {
  position:absolute;
  top:7px; left:7px; right:7px; bottom:7px;
  border-radius:38px;
  overflow:hidden;
  background:#000;
}
.iphone-screen img { width:100%; height:100%; object-fit:cover; object-position:top; }
.dynamic-island {
  position:absolute; top:13px; left:50%; transform:translateX(-50%);
  width:90px; height:28px; background:#000; border-radius:16px; z-index:20;
}
.i-btn-mute { position:absolute; left:-3px; top:84px; width:2.5px; height:18px; background:#3a3a3c; border-radius:1px 0 0 1px; }
.i-btn-vup  { position:absolute; left:-3px; top:112px; width:2.5px; height:28px; background:#3a3a3c; border-radius:1px 0 0 1px; }
.i-btn-vdn  { position:absolute; left:-3px; top:150px; width:2.5px; height:28px; background:#3a3a3c; border-radius:1px 0 0 1px; }
.i-btn-pwr  { position:absolute; right:-3px; top:130px; width:2.5px; height:56px; background:#3a3a3c; border-radius:0 1px 1px 0; }
.brand { position:absolute; bottom:20px; left:0; right:0; text-align:center; color:rgba(255,255,255,0.2); font-size:8px; letter-spacing:2.5px; z-index:20; font-weight:600; text-transform:uppercase; }
</style>
</head>
